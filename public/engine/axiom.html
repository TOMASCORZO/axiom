<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Axiom Engine Runtime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #0a0a0f;
            font-family: 'Geist', 'Inter', -apple-system, system-ui, sans-serif;
            color: #ededed;
        }
        canvas { display: block; width: 100%; height: 100%; }

        #splash {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(139, 92, 246, 0.25), transparent),
                radial-gradient(ellipse 60% 40% at 50% 120%, rgba(217, 70, 239, 0.18), transparent),
                #0a0a0f;
            gap: 28px;
            padding: 24px;
            text-align: center;
            transition: opacity 0.4s ease;
        }
        #splash::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
            pointer-events: none;
        }
        #splash-title {
            position: relative;
            font-size: clamp(40px, 8vw, 88px);
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(180deg, #fafafa 0%, #a1a1aa 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        #splash-subtitle {
            position: relative;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #71717a;
        }
        #splash-accent {
            position: relative;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: #c4b5fd;
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.25);
            backdrop-filter: blur(8px);
        }
        #splash-accent-dot {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            background: #a78bfa; margin-right: 8px; vertical-align: middle;
            box-shadow: 0 0 10px #a78bfa;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #status-text {
            position: relative;
            font-size: 13px;
            color: #71717a;
            font-variant-numeric: tabular-nums;
        }
        #progress-bar {
            position: relative;
            width: 240px; height: 2px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px; overflow: hidden;
            opacity: 0; transition: opacity 0.3s ease;
        }
        #progress-bar.active { opacity: 1; }
        #progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #8b5cf6, #d946ef);
            border-radius: 2px; transition: width 0.3s ease;
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.5);
        }

        #splash.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="canvas" tabindex="0"></canvas>
    <div id="splash">
        <div id="splash-accent"><span id="splash-accent-dot"></span>Runtime ready</div>
        <div id="splash-title">Axiom</div>
        <div id="splash-subtitle">AI Game Engine</div>
        <div id="status-text">Press play to start</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════
        // Axiom Engine Shell — Runs inside an iframe, communicates with
        // the parent React app via postMessage
        // ═══════════════════════════════════════════════════════════════════

        const canvas = document.getElementById('canvas');
        const statusEl = document.getElementById('splash');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const progressBar = document.getElementById('progress-bar');
        const splashTitle = document.getElementById('splash-title');
        const splashSubtitle = document.getElementById('splash-subtitle');

        function setLoading(active, label) {
            progressBar.classList.toggle('active', !!active);
            if (label) statusText.textContent = label;
        }

        // Track FPS
        let lastTime = performance.now();
        let frameCount = 0;
        let currentFps = 0;

        function updateFps() {
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastTime = now;
                sendToParent({ type: 'fps', value: currentFps });
            }
            requestAnimationFrame(updateFps);
        }

        // ── PostMessage Bridge ──────────────────────────────────────────

        function sendToParent(msg) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ source: 'axiom-engine', ...msg }, '*');
            }
        }

        // ── AxiomInspector wiring ───────────────────────────────────────
        // The autoload script (addons/axiom/inspector.gd) sets
        // window.__axiomInspectorCmd to a JavaScriptBridge callback during its
        // _ready(). We forward protocol commands to it and accept its outbound
        // events through window.__axiomPostEvent. Until the script registers,
        // commands queue here so early calls don't get dropped.
        window.__axiomPendingInspectorCmds = [];
        window.__axiomPostEvent = function(jsonStr) {
            try {
                const msg = JSON.parse(jsonStr);
                window.parent.postMessage({ source: 'axiom-engine', ...msg }, '*');
            } catch (err) {
                sendToParent({ type: 'console', level: 'error', message: '[Axiom] __axiomPostEvent bad JSON: ' + err });
            }
        };
        // Set of types the inspector handles. Anything not in here stays in the
        // shell-level switch below.
        const INSPECTOR_CMDS = new Set([
            'scene-tree', 'node-info', 'raycast',
            'set-property', 'set-transform',
            'add-node', 'delete-node', 'select-node',
            'set-gizmo-mode',
        ]);
        function forwardToInspector(command) {
            const json = JSON.stringify(command);
            if (typeof window.__axiomInspectorCmd === 'function') {
                window.__axiomInspectorCmd(json);
            } else {
                window.__axiomPendingInspectorCmds.push(json);
            }
        }
        // Drain the queue once the autoload installs the callback. Poll cheaply
        // — this only matters for the first second or so after engine start.
        const __axiomInspectorDrainTimer = setInterval(function() {
            if (typeof window.__axiomInspectorCmd === 'function') {
                clearInterval(__axiomInspectorDrainTimer);
                while (window.__axiomPendingInspectorCmds.length > 0) {
                    window.__axiomInspectorCmd(window.__axiomPendingInspectorCmds.shift());
                }
            }
        }, 100);

        // Listen for commands from parent
        window.addEventListener('message', function(event) {
            const data = event.data;
            if (!data || data.source !== 'axiom-app') return;

            // Protocol commands belong to the inspector autoload.
            if (INSPECTOR_CMDS.has(data.type)) {
                // Strip the source field before forwarding — the GDScript
                // doesn't care, and it reduces JSON size.
                const { source, ...command } = data;
                forwardToInspector(command);
                return;
            }

            switch (data.type) {
                case 'ping':
                    // Parent bridge connected after shell loaded — re-send ready
                    sendToParent({ type: 'ready' });
                    break;
                case 'start':
                    startEngine(data.files || []);
                    break;
                case 'stop':
                    stopEngine();
                    break;
                case 'sync-files':
                    syncFiles(data.files || []);
                    break;
                case 'reload-scene':
                    reloadScene();
                    break;
                case 'screenshot':
                    takeScreenshot();
                    break;
            }
        });

        // ── Engine Lifecycle ────────────────────────────────────────────

        let engine = null;
        let engineStarted = false;

        async function startEngine(projectFiles) {
            if (engineStarted) return;

            try {
                setLoading(true, 'Loading WASM module...');
                progressFill.style.width = '20%';

                // Diagnostics: log received files
                sendToParent({ type: 'console', level: 'log', message: `[Axiom] Received ${projectFiles.length} files from editor` });
                for (const f of projectFiles) {
                    const size = f.content ? f.content.length : 0;
                    const enc = f.encoding || 'utf8';
                    if (enc === 'base64') {
                        sendToParent({ type: 'console', level: 'log', message: `[Axiom]   → ${f.path} (${size} b64 chars, binary)` });
                    } else {
                        const preview = f.content ? f.content.slice(0, 60).replace(/\n/g, '\\n') : '(empty)';
                        sendToParent({ type: 'console', level: 'log', message: `[Axiom]   → ${f.path} (${size} chars): ${preview}` });
                    }
                }

                // Check if axiom.js exists
                const scriptResponse = await fetch('/engine/axiom.js');
                if (!scriptResponse.ok) {
                    sendToParent({ type: 'error', message: 'axiom.js not found. Run scripts/build-engine.sh first.' });
                    statusText.textContent = 'Engine not compiled';
                    progressFill.style.width = '0%';
                    return;
                }

                // Load the engine script dynamically
                if (!window.Engine) {
                    const script = document.createElement('script');
                    script.src = '/engine/axiom.js';
                    await new Promise((resolve, reject) => {
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    });
                }

                progressFill.style.width = '40%';
                statusText.textContent = 'Initializing engine...';

                // Check cross-origin isolation (required for SharedArrayBuffer / threads)
                sendToParent({ type: 'console', level: 'log', message: `[Axiom] crossOriginIsolated=${self.crossOriginIsolated}, SharedArrayBuffer=${typeof SharedArrayBuffer !== 'undefined'}` });

                // Create engine instance. Pass the project path via Emscripten's
                // `arguments` AND the engine wrapper's `args` — some builds consume
                // one, some the other.
                engine = new Engine({
                    canvas: canvas,
                    executable: '/engine/axiom',
                    canvasResizePolicy: 2, // Adapt to parent
                    args: ['--path', '/project'],
                    arguments: ['--path', '/project'],
                    onProgress: function(current, total) {
                        const pct = total > 0 ? Math.round((current / total) * 100) : 0;
                        progressFill.style.width = `${40 + pct * 0.5}%`;
                        sendToParent({ type: 'progress', value: 40 + pct * 0.5 });
                    },
                    onExit: function(code) {
                        engineStarted = false;
                        sendToParent({ type: 'console', level: 'warn', message: `[Axiom] Engine exited with code ${code}` });
                        sendToParent({ type: 'stopped', exitCode: code });
                    },
                    onPrint: function(text) {
                        sendToParent({ type: 'console', level: 'log', message: text });
                    },
                    onPrintError: function(text) {
                        sendToParent({ type: 'console', level: 'error', message: text });
                    },
                });

                // Initialize engine — loads the 99MB WASM module
                statusText.textContent = 'Loading WASM engine...';
                await engine.init('/engine/axiom');
                sendToParent({ type: 'console', level: 'log', message: '[Axiom] WASM module loaded successfully' });

                progressFill.style.width = '70%';
                statusText.textContent = 'Loading project files...';

                // Preload project files into the virtual filesystem
                let preloadedCount = 0;
                for (const file of projectFiles) {
                    if (!file.content) continue;
                    const buffer = decodeFileContent(file);
                    await engine.preloadFile(buffer.buffer, `/project/${file.path}`);
                    preloadedCount++;
                }
                sendToParent({ type: 'console', level: 'log', message: `[Axiom] Preloaded ${preloadedCount}/${projectFiles.length} files to /project/` });

                // Check critical file: project.godot
                const hasProjectFile = projectFiles.some(f => f.path === 'project.godot');
                if (!hasProjectFile) {
                    sendToParent({ type: 'console', level: 'warn', message: '[Axiom] WARNING: No project.godot found! Engine may show blank screen.' });
                }

                // Check for main scene reference
                const projFile = projectFiles.find(f => f.path === 'project.godot');
                if (projFile && projFile.content) {
                    const mainSceneMatch = projFile.content.match(/run\/main_scene="([^"]+)"/);
                    if (mainSceneMatch) {
                        const scenePath = mainSceneMatch[1].replace('res://', '');
                        const sceneExists = projectFiles.some(f => f.path === scenePath);
                        sendToParent({ type: 'console', level: 'log', message: `[Axiom] Main scene: ${mainSceneMatch[1]} (${sceneExists ? 'FOUND' : 'MISSING'})` });
                        if (!sceneExists) {
                            sendToParent({ type: 'console', level: 'error', message: `[Axiom] Main scene file "${scenePath}" not in project files! Available: ${projectFiles.map(f=>f.path).join(', ')}` });
                        }
                    } else {
                        sendToParent({ type: 'console', level: 'warn', message: '[Axiom] WARNING: No run/main_scene in project.godot' });
                    }
                }

                progressFill.style.width = '90%';
                statusText.textContent = 'Starting game...';

                // Use start() — startGame() tries to fetch a <executable>.pck via
                // HTTP, but we load loose files into the virtual FS.
                await engine.start({
                    args: ['--path', '/project'],
                    arguments: ['--path', '/project'],
                });

                engineStarted = true;
                statusEl.classList.add('hidden');
                progressFill.style.width = '100%';

                sendToParent({ type: 'started' });
                sendToParent({ type: 'console', level: 'log', message: '[Axiom] Engine started — waiting for Godot output...' });

                // Start FPS tracking
                requestAnimationFrame(updateFps);

            } catch (err) {
                const message = err instanceof Error ? err.message : String(err);
                sendToParent({ type: 'error', message: `Engine failed to start: ${message}` });
                sendToParent({ type: 'console', level: 'error', message: `[Axiom] Stack: ${err instanceof Error ? err.stack : 'N/A'}` });
                setLoading(false, 'Failed to start engine');
                progressFill.style.width = '0%';
            }
        }

        function stopEngine() {
            if (engine && engineStarted) {
                engine.requestQuit();
                engineStarted = false;
                statusEl.classList.remove('hidden');
                setLoading(false, 'Press play to start');
                progressFill.style.width = '0%';
                sendToParent({ type: 'stopped' });
            }
        }

        function syncFiles(files) {
            if (!engine || !engineStarted) return;

            for (const file of files) {
                if (!file.content) continue;
                const buffer = decodeFileContent(file);
                engine.copyToFS(`/project/${file.path}`, buffer.buffer);
            }
            sendToParent({ type: 'files-synced' });
        }

        // Text files come through as utf-8 strings; binaries (png, audio, glb)
        // arrive base64-encoded so they survive the postMessage hop without
        // being mangled by TextEncoder. Branch on `encoding` per file.
        function decodeFileContent(file) {
            if (file.encoding === 'base64') {
                const binary = atob(file.content);
                const arr = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
                return arr;
            }
            return new TextEncoder().encode(file.content);
        }

        function reloadScene() {
            if (!engine || !engineStarted) return;
            // The engine exposes a method to reload the current scene
            // This is done via the command line interface
            sendToParent({ type: 'console', level: 'log', message: '[Axiom] Scene reload requested' });
        }

        function takeScreenshot() {
            if (!canvas) return;
            try {
                const dataUrl = canvas.toDataURL('image/png');
                sendToParent({ type: 'screenshot', dataUrl: dataUrl });
            } catch (err) {
                sendToParent({ type: 'error', message: 'Failed to take screenshot' });
            }
        }

        // ── Forward Input Events ────────────────────────────────────────

        // Forward keyboard events to the canvas
        canvas.addEventListener('keydown', function(e) { e.preventDefault(); });
        canvas.addEventListener('keyup', function(e) { e.preventDefault(); });

        // Auto-focus canvas
        canvas.focus();

        // Resize canvas to fill viewport
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Notify parent that shell is ready
        sendToParent({ type: 'ready' });
    </script>
</body>
</html>
